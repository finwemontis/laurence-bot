<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laurence Bot Test</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      margin-bottom: 12px;
      font-size: 16px;
      padding: 12px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f6f6f6;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
    }

    .muted {
      color: #666;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <h1>Laurence 聊天测试页</h1>
  <p class="muted">本地测试用页面。输入一句话，点发送即可。</p>

  <textarea id="message" placeholder="比如：你今天为什么又没按时吃晚饭？"></textarea>
  <br />
  <button id="sendBtn">发送</button>

  <pre id="output">等待输入……</pre>

  <script>
    const history = [];
    const output = document.getElementById("output");
    const sendBtn = document.getElementById("sendBtn");
    const messageInput = document.getElementById("message");

    function logSessionDebug(message, data) {
      if (!data?.meta?.sessionState) {
        return;
      }

      console.group("[session-debug] Laurence response");
      console.log("user message:", message);
      console.log("reply:", data.reply);
      console.log("sessionState:", data.meta.sessionState);
      console.groupEnd();
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      sendBtn.disabled = true;
      output.textContent = "请求中……";

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            history
          })
        });

        const data = await resp.json();

        if (!resp.ok) {
          output.textContent = "请求失败：\n" + JSON.stringify(data, null, 2);
          return;
        }

        history.length = 0;
        history.push(...data.history);
        logSessionDebug(message, data);

        output.textContent =
          "Laurence：\n\n" + data.reply + "\n\n---\n\n完整 history：\n" +
          JSON.stringify(data.history, null, 2);

        messageInput.value = "";
      } catch (err) {
        output.textContent = "网络错误：\n" + String(err);
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
